<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機器人設定 - 我是機器人</title>
    <style>
        :root {
            --sidebar-width: 260px;
            --bg-dark: #2f3136;
            --bg-sidebar: #202225;
            --discord-blue: #5865f2;
            --text-gray: #b9bbbe;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Noto Sans CJK TC', Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-dark);
            color: #dcddde;
        }

        /* --- 響應式側邊欄 --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-shrink: 0;
            transition: width 0.3s ease;
            z-index: 100;
        }

        .sidebar-top { padding: 20px; }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--discord-blue);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .logo-icon img { width: 100%; height: 100%; object-fit: cover; }

        .logo-text { font-size: 20px; font-weight: bold; color: #fff; white-space: nowrap; }

        .sidebar-nav ul { list-style: none; padding: 0; margin: 0; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px;
            color: var(--text-gray);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: 0.2s;
            white-space: nowrap;
        }

        .sidebar-nav a:hover, .sidebar-nav a.active {
            background-color: #36393f;
            color: #fff;
        }

        .nav-text { margin-left: 12px; }

        /* --- 主要內容區 --- */
        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            background-color: #36393f;
        }

        /* --- 數據統計卡片 --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            padding: 20px;
            border-radius: 12px;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .stat-card h3 { margin: 0; font-size: 13px; opacity: 0.8; }
        .stat-card p { margin: 8px 0 0 0; font-size: 28px; font-weight: bold; }

        /* --- 通用卡片 --- */
        .card {
            background-color: var(--bg-dark);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .card h2 { margin-top: 0; font-size: 18px; color: #fff; margin-bottom: 15px; }

        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .input-box {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #202225;
            background: #202225;
            color: #fff;
            font-size: 14px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: #fff;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.8; }
        .btn-green { background: #43b581; }
        .btn-yellow { background: #faa61a; }
        .btn-red { background: #f04747; }
        .btn-gray { background: #747f8d; }
        .btn-blue { background: var(--discord-blue); }

        /* --- 拖曳列樣式 --- */
        .status-drag-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #202225;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid #202225;
            transition: transform 0.2s, background-color 0.2s;
        }
        .status-drag-row.dragging {
            opacity: 0.4;
            background: #4f545c;
        }
        .drag-handle {
            cursor: grab;
            font-size: 18px;
            color: var(--text-gray);
            user-select: none;
            padding: 0 5px;
        }
        .drag-handle:active {
            cursor: grabbing;
        }

        /* --- 用戶面板 --- */
        .user-panel {
            background: #23272a;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px;
            border-radius: 8px;
        }

        .user-avatar { width: 32px; height: 32px; border-radius: 50%; }
        .user-info { overflow: hidden; }
        .user-name { font-weight: bold; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- 📱 響應式佈局 --- */
        @media (max-width: 992px) {
            :root { --sidebar-width: 70px; }
            .logo-text, .nav-text, .user-info { display: none; }
            .sidebar-top, .sidebar-nav a, .user-panel { justify-content: center; padding: 10px; }
            .logo-section { margin-bottom: 20px; }
        }

        @media (max-width: 576px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; }
            .sidebar-top { padding: 10px; width: 100%; }
            .logo-section { margin-bottom: 0; }
            .sidebar-nav ul { display: flex; }
            .sidebar-nav a { margin-bottom: 0; margin-right: 5px; }
            .user-panel { display: none; }
            .main-content { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-top">
            <div class="logo-section">
                <div class="logo-icon">
                    <img src="{{ url_for('static', filename='flork_logo.png') }}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                </div>
                <div class="logo-text">我是機器人</div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="{{ url_for('index') }}"><span>🏠</span><span class="nav-text">選擇伺服器</span></a></li>
                    <li><a href="{{ url_for('bot_settings_page') }}" class="active"><span>🤖</span><span class="nav-text">機器人設定</span></a></li>
                    <li><a href="{{ url_for('all_guild_logs') }}"><span>📜</span><span class="nav-text">全域日誌</span></a></li>
                </ul>
            </nav>
        </div>
        <div class="user-panel">
            <img src="https://cdn.discordapp.com/avatars/{{ user.id }}/{{ user.avatar }}.png" class="user-avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/1.png'">
            <div class="user-info">
                <div class="user-name">{{ user.username }}</div>
                <div style="font-size: 11px; color: var(--text-gray);">開發者權限</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <h1 style="color: #fff; margin-bottom: 25px;">⚙️ 控制面板</h1>

        <div class="stats-grid">
            <div class="stat-card" style="background: linear-gradient(135deg, #5865f2, #4752c4);">
                <h3>服務伺服器數</h3>
                <p>{{ total_guilds }} <small style="font-size: 14px;">個</small></p>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #43b581, #3ca374);">
                <h3>服務總人數</h3>
                <p>{{ total_users }} <small style="font-size: 14px;">位</small></p>
            </div>
        </div>

        <div class="card">
            <h2>🔮 機器人狀態與燈號</h2>
            <div class="flex-row" style="margin-bottom: 15px;">
                <button onclick="updateBotStatus('online')" class="btn btn-green">線上</button>
                <button onclick="updateBotStatus('idle')" class="btn btn-yellow">閒置</button>
                <button onclick="updateBotStatus('dnd')" class="btn btn-red">請勿打擾</button>
                <button onclick="updateBotStatus('offline')" class="btn btn-gray">隱身</button>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <div class="flex-row">
                    <select id="activity_type" class="input-box" style="flex: 0 0 130px; background: #202225; color: #fff; border: 1px solid #202225;">
                        <option value="custom">💬 自訂狀態</option>
                        <option value="game">🎮 正在玩</option>
                    </select>
                    <button onclick="updateActivity()" class="btn btn-blue">更新狀態至 Bot</button>
                </div>

                <div id="carousel_container" style="margin-top: 5px;">
                    </div>

                <div>
                    <button type="button" onclick="addInputRow()" class="btn btn-gray" style="padding: 6px 15px; font-size: 13px;">➕ 增加文字框</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🛡️ 黑名單管理</h2>
            <div class="flex-row">
                <input type="text" id="blacklist_id" class="input-box" placeholder="輸入要封鎖的 User ID...">
                <button onclick="handleBlacklist()" class="btn btn-red">確認封鎖</button>
            </div>
        </div>

        <div class="card">
            <h2>📜 系統運行日誌 (Live)</h2>
            <div id="log-screen" style="background: #000; color: #0f0; padding: 15px; border-radius: 6px; height: 250px; overflow-y: auto; font-family: monospace; font-size: 12px; border: 1px solid #444;">讀取中...</div>
        </div>
    </div>

    <script>
        const container = document.getElementById('carousel_container');
        let draggedItem = null;

        // 💡 智慧檢查：用來控制 ❌ 按鈕要不要隱藏
        function checkDeleteButtons() {
            const rows = container.querySelectorAll('.status-drag-row');
            rows.forEach(row => {
                const deleteBtn = row.querySelector('.btn-delete-row');
                if (rows.length === 1) {
                    deleteBtn.style.display = 'none';   // 只有一格就隱藏
                } else {
                    deleteBtn.style.display = 'block';  // 超過一格就顯示
                }
            });
        }

        // 動態新增輸入框
        function addInputRow(textValue = "") {
            const row = document.createElement('div');
            row.className = 'status-drag-row';
            row.draggable = true;

            row.innerHTML = `
                <span class="drag-handle" title="按著拖曳順序">☰</span>
                <button type="button" onclick="moveUp(this)" class="btn btn-gray" style="padding: 4px 8px; margin: 0; font-size: 11px;" title="上移">▲</button>
                <button type="button" onclick="moveDown(this)" class="btn btn-gray" style="padding: 4px 8px; margin: 0; font-size: 11px;" title="下移">▼</button>
                <input type="text" class="input-box status-sub-input" value="${textValue}" placeholder="輸入狀態文字..." style="margin: 0; flex: 1;">
                <button type="button" onclick="removeInputRow(this)" class="btn btn-red btn-delete-row" style="padding: 8px 12px; margin: 0;">❌</button>
            `;

            row.addEventListener('dragstart', () => {
                draggedItem = row;
                setTimeout(() => row.classList.add('dragging'), 0);
            });

            row.addEventListener('dragend', () => {
                row.classList.remove('dragging');
                draggedItem = null;
            });

            container.appendChild(row);

            // 💡 每次新增格子後，都檢查一次數量
            checkDeleteButtons();
        }

        // 讓大容器自己去算滑鼠現在在哪一格
        container.addEventListener('dragover', (e) => {
            e.preventDefault();
            const afterElement = getDragAfterElement(container, e.clientY);
            const draggable = document.querySelector('.dragging');
            if (draggable) {
                if (afterElement == null) {
                    container.appendChild(draggable);
                } else {
                    container.insertBefore(draggable, afterElement);
                }
            }
        });

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.status-drag-row:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // 🔼 向上移動一格
        function moveUp(button) {
            const row = button.parentElement;
            const previous = row.previousElementSibling;
            if (previous) {
                container.insertBefore(row, previous);
            }
        }

        // 🔽 向下移動一格
        function moveDown(button) {
            const row = button.parentElement;
            const next = row.nextElementSibling;
            if (next) {
                container.insertBefore(next, row);
            }
        }

        // 刪除格子
        function removeInputRow(button) {
            const rows = container.querySelectorAll('.status-drag-row');
            if (rows.length > 1) {
                button.parentElement.remove();
                // 💡 刪除成功後，重新檢查數量
                checkDeleteButtons();
            }
        }

        // 初始化自動生出兩個預設框
        addInputRow("咕咕嘎嘎");
        addInputRow("巴巴博弈");

        // 傳送設定給後端
        function updateBotStatus(status) {
            const type = document.getElementById('activity_type').value;
            const inputElements = document.querySelectorAll('.status-sub-input');
            let textArray = [];
            
            inputElements.forEach(input => {
                if(input.value.trim()) textArray.push(input.value.trim());
            });

            const SnowyText = textArray.join(',');

            fetch('/api/bot/update_status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    status: status, 
                    activity: SnowyText,
                    type: type 
                })
            })
            .then(res => res.json())
            .then(data => alert(data.message));
        }

        function updateActivity() {
            updateBotStatus('online');
        }

        function handleBlacklist() {
            const uid = document.getElementById('blacklist_id').value;
            if(!uid) return alert("請輸入 ID");
            fetch('/api/blacklist/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: uid })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                document.getElementById('blacklist_id').value = "";
            });
        }

        function fetchLogs() {
            fetch('/get_raw_logs').then(res => res.text()).then(data => {
                const screen = document.getElementById('log-screen');
                if(screen) {
                    screen.innerText = data;
                    screen.scrollTop = screen.scrollHeight;
                }
            });
        }
        setInterval(fetchLogs, 3000);
        fetchLogs();
    </script>
</body>
</html>
