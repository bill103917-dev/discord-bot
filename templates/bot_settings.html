<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機器人設定 - 我是機器人</title>
    <style>
        :root {
            --sidebar-width: 260px;
            --bg-dark: #2f3136;
            --bg-sidebar: #202225;
            --discord-blue: #5865f2;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Noto Sans CJK TC', Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-dark);
            color: #dcddde;
        }

        /* --- 響應式側邊欄 --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-shrink: 0;
            transition: width 0.3s ease;
            z-index: 100;
        }

        .sidebar-top { padding: 20px; }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .logo-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--discord-blue);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-icon img { width: 100%; height: 100%; border-radius: 50%; }

        .logo-text { font-size: 20px; font-weight: bold; color: #fff; white-space: nowrap; }

        .sidebar-nav ul { list-style: none; padding: 0; margin: 0; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px;
            color: #b9bbbe;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: 0.2s;
            white-space: nowrap;
        }

        .sidebar-nav a:hover, .sidebar-nav a.active {
            background-color: #36393f;
            color: #fff;
        }

        .nav-text { margin-left: 12px; }

        /* --- 主要內容區 --- */
        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            background-color: #36393f;
        }

        .dashboard-header { color: #fff; margin-bottom: 25px; }

        /* --- 數據統計卡片 --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            padding: 20px;
            border-radius: 12px;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .stat-card h3 { margin: 0; font-size: 14px; opacity: 0.8; }
        .stat-card p { margin: 10px 0 0 0; font-size: 28px; font-weight: bold; }

        /* --- 通用卡片 --- */
        .card {
            background-color: var(--bg-dark);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .card h2 { margin-top: 0; font-size: 18px; color: #fff; margin-bottom: 15px; }

        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .input-box {
            flex: 1;
            min-width: 180px;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #202225;
            background: #202225;
            color: #fff;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: #fff;
        }

        /* --- 用戶面板 --- */
        .user-panel {
            background: #23272a;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 15px;
            border-radius: 10px;
        }

        .user-avatar { width: 35px; height: 35px; border-radius: 50%; }
        .user-info { overflow: hidden; }
        .user-name { font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- 📱 響應式關鍵代碼 --- */
        
        /* 平板版：縮小側邊欄 */
        @media (max-width: 992px) {
            :root { --sidebar-width: 80px; }
            .logo-text, .nav-text, .user-info { display: none; }
            .sidebar-top, .sidebar-nav a { display: flex; justify-content: center; }
            .logo-section { margin-bottom: 20px; justify-content: center; }
            .user-panel { justify-content: center; padding: 10px; }
        }

        /* 手機版：側邊欄隱藏或內容堆疊 */
        @media (max-width: 576px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                height: auto;
                flex-direction: row;
                padding: 10px;
            }
            .sidebar-top { padding: 0; display: flex; align-items: center; }
            .logo-section { margin-bottom: 0; }
            .sidebar-nav ul { display: flex; gap: 5px; }
            .sidebar-nav a { margin-bottom: 0; padding: 8px; }
            .user-panel { display: none; } /* 手機版隱藏底端用戶面板節省空間 */
            .main-content { padding: 15px; }
            .stat-card p { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-top">
            <div class="logo-section">
                <div class="logo-icon">
                    <img src="{{ url_for('static', filename='flork_logo.png') }}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                </div>
                <div class="logo-text">我是機器人</div>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="{{ url_for('index') }}"><span>🏠</span><span class="nav-text">選擇伺服器</span></a></li>
                    <li><a href="{{ url_for('bot_settings_page') }}" class="active"><span>🤖</span><span class="nav-text">機器人設定</span></a></li>
                    <li><a href="{{ url_for('all_guild_logs') }}"><span>📜</span><span class="nav-text">全域日誌</span></a></li>
                </ul>
            </nav>
        </div>

        <div class="user-panel">
            <img src="https://cdn.discordapp.com/avatars/{{ user.id }}/{{ user.avatar }}.png" class="user-avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/1.png'">
            <div class="user-info">
                <div class="user-name">{{ user.username }}</div>
                <div style="font-size: 12px; color: #b9bbbe;">開發者</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <h1 class="dashboard-header">⚙️ 核心控制面板</h1>

        <div class="stats-grid">
            <div class="stat-card" style="background: linear-gradient(135deg, #5865f2, #4752c4);">
                <h3>總服務伺服器</h3>
                <p>{{ total_guilds }} <small style="font-size: 14px;">個</small></p>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #43b581, #3ca374);">
                <h3>服務總人數</h3>
                <p>{{ total_users }} <small style="font-size: 14px;">位</small></p>
            </div>
        </div>

        <div class="card">
            <h2>🛡️ 黑名單管理</h2>
            <div class="flex-row">
                <input type="text" id="blacklist_id" class="input-box" placeholder="輸入用戶 ID...">
                <button onclick="addToBlacklist()" class="btn" style="background: #f04747;">確認封鎖</button>
            </div>
        </div>

        <div class="card">
            <h2>🔮 機器人狀態</h2>
            <div class="flex-row" style="margin-bottom: 15px;">
                <button onclick="updateStatus('online')" class="btn" style="background: #43b581;">線上</button>
                <button onclick="updateStatus('idle')" class="btn" style="background: #faa61a;">閒置</button>
                <button onclick="updateStatus('dnd')" class="btn" style="background: #f04747;">請勿打擾</button>
            </div>
            <div class="flex-row">
                <input type="text" id="activity_text" class="input-box" placeholder="更新狀態文字...">
                <button onclick="updateActivity()" class="btn" style="background: #5865f2;">更新</button>
            </div>
        </div>

        <div class="card">
            <h2>📜 運行日誌</h2>
            <div id="log-screen" style="background: #000; color: #0f0; padding: 15px; border-radius: 6px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px;">正在讀取日誌...</div>
        </div>
    </div>

    <script>
        function addToBlacklist() {
            const uid = document.getElementById('blacklist_id').value;
            if(!uid) return alert("請輸入 ID");
            fetch('/api/blacklist/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: uid })
            }).then(res => res.json()).then(data => alert(data.message));
        }

        function fetchLogs() {
            fetch('/get_raw_logs').then(res => res.text()).then(data => {
                const screen = document.getElementById('log-screen');
                screen.innerText = data;
                screen.scrollTop = screen.scrollHeight;
            });
        }
        setInterval(fetchLogs, 3000);
    </script>
</body>
</html>
